services:
  - type: web
    name: sistema-facturacion
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn facturacion.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: *.onrender.com
      - key: DB_ENGINE
        value: postgresql
      - key: DB_NAME
        fromDatabase:
          name: sistema-facturacion-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sistema-facturacion-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sistema-facturacion-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: sistema-facturacion-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sistema-facturacion-db
          property: port
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: True
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
