services:
  - type: web
    name: sistema-facturacion
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn facturacion.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: *.onrender.com
      - key: DB_ENGINE
        value: postgresql
      - key: DB_NAME
        fromDatabase:
          name: sistema-facturacion-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sistema-facturacion-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sistema-facturacion-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: sistema-facturacion-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sistema-facturacion-db
          property: port
