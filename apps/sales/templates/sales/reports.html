{% extends 'base.html' %}

{% block title %}Reportes de Ventas{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2><i class="fas fa-chart-bar"></i> Reportes de Ventas</h2>
    <hr>
    <div class="card">
        <div class="card-body">
            <form method="get" action="{% url 'sales:export' %}" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Desde</label>
                    <input type="date" name="date_from" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Hasta</label>
                    <input type="date" name="date_to" class="form-control">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-file-excel"></i> Exportar a Excel
                    </button>
                </div>
            </form>
        </div>
    </div>
    <a href="{% url 'sales:list' %}" class="btn btn-secondary mt-3">Volver</a>
</div>
{% endblock %}
